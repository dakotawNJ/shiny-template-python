        <!-- Overview -->
        <template id="overview-template">
            <p>
                This document provides a convention for developing web applications using POSIT's <a href="https://shiny.posit.co/" target="_blank">Shiny</a> framework.
                It leverages Shiny&#039;s built-in module functionality to organize application files and code to make developing, updating, and collaborating on apps easier than the traditional single-file method.
                These modules are not to be confused with Python&#039;s native modules, these are designed specifically for the Shiny framework.
            </p>
            <p>
                Each UI layout has top-level navigation tabs (either in a navbar or a sidebar) to allow the user to navigate the various pages within the application.
                For each navigation tab, there will be a separate Shiny module and each module will have its own separate Python file.
                Each file will contain only its associated page&#039;s UI and server code.
                More here: <a href="https://shiny.posit.co/py/docs/modules.html" target="_blank">Shiny Modules</a>
            </p>
        </template>

        <!-- Folder Structure -->
        <template id="folder-template">
            <h3>Folder Structure</h3>
            <p>
                The folder structure starts by creating an <code>app.py</code> file in the root directory.
                This is the entry point to the app that imports the core UI and server components.
                You then create an <code>mods/</code> (Python) subdirectory where each module file will be created.
            </p>
            <p>
                Shiny automatically creates an initial folder structure when the <kbd>>shiny create</kbd> command is run.
                It will create an <code>app.py</code>, a <code>requirements.txt</code>, and a <code>shared.py</code> file in the root directory.
                More here: <a href="https://shiny.posit.co/py/get-started/create-run.html" target="_blank">Create and Run</a>
            </p>
            <p>
                Global variables shared across the entire application should go in <code>shared.py</code>.
                However, if data is loaded here or outside of a module or function&#039;s scope, it might slow down your application at startup.
                It&#039;s better practice to load data within module or function scope. 
            </p>
            <p>
                UI and server code should go in the <code>mods/</code> subdirectory.
                To be able to import UI objects and server functions, you have to create a blank <code>__init__.py</code> file in it.
                Once created, you should be able to import them at the top of your <code>app.py</code> file. 
            </p>
            <p>
                Data files should go in a <code>data/</code> subdirectory.
                Any custom HTML/CSS/JavaScript files should go in the <code>www/</code> subdirectory.
            </p>
            <div class="card w-25">
                <div class="card-body">
                    <ul class="list-unstyled">
                        <li>project-directory/</li>
                        <ul style="list-style-type: none;">
                            <li>app.py</li>
                            <li>shared.py</li>
                            <li>requirements.txt</li>
                            <li>mods/</li>

                            <li>data/</li>
                            <li>www/</li>
                        </ul>
                    </ul>
                </div>
            </div>
        </template>

        <!-- App Structure -->
        <template id="app-template">
            <h3>App Structure</h3>
            <p>
                In the app file, you only define top-level pages in the nav object and only top-level modules in the server function.
            </p>
            <h5>State Object</h5>
            <p>
                The pages in your application will most likely need to access reactive values from other pages and be able to react to those values&#039; changes.
                For example, a user input page filtering data on a table output in another page.
                Instead of passing multiple separate reactive values to each page module to achieve this, there will be a single state object that holds each reactive value that will be passed to each page module in the app file.
            </p>
            <p>
                Additionally, each module can have its own internal state object that other pages cannot access.
                These are initialized at the start of the page&#039;s server function.
                This is optional, as Shiny&#039;s standard reactive workflow works the same way here. 
            </p>
            <p>
                In Python, state is created by creating a <a href="https://shiny.posit.co/py/docs/comp-r-shiny.html#reactive-values" target="_blank">dictionary of reactive values</a>:
            </p>
            <pre class="card w-50">
                <code class="language-python card-body"></code>
            </pre>
            <h5>Custom Functions</h5>
            <p>
                Functions you write that don&#039;t depend on or affect the UI or server, such as for data processing, should be separated from the server code entirely.
                Your app should capture any reactive values within the server code, then pass the non-reactive value to your function.
                The function should then return another non-reactive value which can then be handled within the server/UI code. 
            </p>
            <p>
                Place such functions in a separate <code>functions.py</code> file.
                This makes it easier to test them outside of a Shiny session.
                Try not to write custom functions solely for UI functionality.
                This creates a dependency within your application that is hard to test and can become quickly outdated.
                Prefer to repeat UI/server code if necessary. 
            </p>
        </template>

            </p>
            <ul class="list-unstyled card card-body w-50"></ul>

            </p>
            <p>
                Try to minimize the libraries used in each app to the minimum needed to perform its intended purpose.
                This is to minimize the overhead of maintaining multiple package versions to avoid conflicts.
                Additionally, it reduces the amount of packages a user has to install or update if the app is shared locally. 
            </p>
